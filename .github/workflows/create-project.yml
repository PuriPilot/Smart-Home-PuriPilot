name: Create Project Board

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  create-project:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      projects: write
      issues: write

    steps:
      - name: Check out
        uses: actions/checkout@v4

      # 1. 프로젝트 중복 확인
      - name: Find existing project
        id: find_project
        uses: actions/github-script@v7
        with:
          script: |
            const { data: projects } = await github.rest.projects.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo
            });

            const name = "Smart Home AirPilot";
            const found = projects.find(p => p.name === name);

            return found ? { id: found.id, number: found.number } : {};

      # 2. 없으면 프로젝트 생성
      - name: Create Project
        id: create_project
        if: steps.find_project.outputs.id == ''
        uses: peter-evans/create-project@v2
        with:
          name: Smart Home AirPilot
          body: |
            Smart Home AirPilot 프로젝트입니다.
            스프린트 구조로 구성됩니다.

      # 3. 사용할 프로젝트 번호 결정
      - name: Set project number
        id: project_number
        run: |
          if [ "${{ steps.find_project.outputs.number }}" != "" ]; then
            echo "project_number=${{ steps.find_project.outputs.number }}" >> $GITHUB_OUTPUT
          else
            echo "project_number=${{ steps.create_project.outputs.project_number }}" >> $GITHUB_OUTPUT
          fi

      # 4. Sprint 컬럼 생성 (중복 방지)
      - name: Create Project Columns
        uses: actions/github-script@v7
        with:
          script: |
            const columns = [
              "Sprint 0 - 설계",
              "Sprint 1 - Graph & API",
              "Sprint 2 - Kafka + Edge",
              "Sprint 3 - Worker & Control",
              "Final Sprint - Demo",
              "Done"
            ];

            const projectId = ${{ steps.project_number.outputs.project_number }};
            const { data: existing } = await github.rest.projects.listColumns({
              project_id: projectId
            });

            for (const name of columns) {
              if (!existing.find(c => c.name === name)) {
                await github.rest.projects.createColumn({
                  project_id: projectId,
                  name
                });
                console.log(`Created column: ${name}`);
              } else {
                console.log(`Column exists: ${name}`);
              }
            }

      # 5. 레이블 생성
      - name: Create Labels
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: "frontend", color: "1D76DB" },
              { name: "backend", color: "5319E7" },
              { name: "worker", color: "FBCA04" },
              { name: "edge", color: "0E8A16" },
              { name: "pm", color: "B60205" }
            ];

            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ...label
                });
                console.log(`Created label: ${label.name}`);
              } catch {
                console.log(`Label exists: ${label.name}`);
              }
            }

      # 6. Sprint별 이슈 자동 생성 + 칼럼에 자동 배치
      - name: Create Issues per Sprint
        uses: actions/github-script@v7
        with:
          script: |
            const projectId = ${{ steps.project_number.outputs.project_number }};
            const { data: columns } = await github.rest.projects.listColumns({
              project_id: projectId
            });
            const columnMap = {};
            for (const c of columns) columnMap[c.name] = c.id;

            const issueTemplates = [
              {
                sprint: "Sprint 0 - 설계",
                issues: [
                  { title: "프로젝트 스코프 확정", labels: ["pm"] },
                  { title: "데이터 스키마 확정 (Supabase)", labels: ["backend", "pm"] },
                  { title: "API 명세서 통일", labels: ["pm"] },
                  { title: "Supabase 테이블 생성", labels: ["backend"] },
                  { title: "Kafka Topic 생성", labels: ["backend"] }
                ]
              },
              {
                sprint: "Sprint 1 - Graph & API",
                issues: [
                  { title: "House Graph GET/POST 구현", labels: ["backend"] },
                  { title: "Room Graph Editor UI 스캐폴드", labels: ["frontend"] },
                  { title: "Telemetry 더미 생성 함수 준비", labels: ["edge"] },
                  { title: "Human Event 더미 생성 함수 준비", labels: ["edge"] },
                  { title: "Prediction 더미 생성 함수 준비", labels: ["edge"] },
                  { title: "Graph 저장/불러오기 테스트", labels: ["frontend", "backend"] }
                ]
              },
              {
                sprint: "Sprint 2 - Kafka + Edge",
                issues: [
                  { title: "Kafka Producer 완성", labels: ["backend"] },
                  { title: "Telemetry POST 자동화", labels: ["edge"] },
                  { title: "Human Event POST 자동화", labels: ["edge"] },
                  { title: "Prediction POST 자동화", labels: ["edge"] },
                  { title: "Kafka 메시지 적재 확인", labels: ["backend"] },
                  { title: "Dashboard 기본 틀 제작", labels: ["frontend"] }
                ]
              },
              {
                sprint: "Sprint 3 - Worker & Control",
                issues: [
                  { title: "Kafka Consumer 3개 스트림 통합", labels: ["worker"] },
                  { title: "Predictive Control Logic 구현", labels: ["worker"] },
                  { title: "Supabase recommendations 저장", labels: ["worker", "backend"] },
                  { title: "Dashboard fanLevel 실시간 반영", labels: ["frontend"] }
                ]
              },
              {
                sprint: "Final Sprint - Demo",
                issues: [
                  { title: "전체 오류 수정", labels: ["pm"] },
                  { title: "UI 레이아웃 정리", labels: ["frontend"] },
                  { title: "데모 시나리오 구성", labels: ["pm"] },
                  { title: "발표 스크립트 작성", labels: ["pm"] },
                  { title: "데모 리허설 진행", labels: ["pm"] }
                ]
              }
            ];

            const existing = await github.paginate(
              github.rest.issues.listForRepo,
              { owner: context.repo.owner, repo: context.repo.repo, state: "all" }
            );
            const existingTitles = existing.map(i => i.title);

            for (const sprint of issueTemplates) {
              const columnId = columnMap[sprint.sprint];

              for (const issue of sprint.issues) {
                if (existingTitles.includes(issue.title)) {
                  console.log(`Issue exists: ${issue.title}`);
                  continue;
                }

                const newIssue = await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: issue.title,
                  labels: issue.labels
                });

                await github.rest.projects.createCard({
                  column_id: columnId,
                  content_id: newIssue.data.id,
                  content_type: "Issue"
                });

                console.log(`Created issue: ${issue.title}`);
              }
            }