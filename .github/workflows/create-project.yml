name: Create Super Simple Project Board

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write
  issues: write

jobs:
  create:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      repository-projects: write
      issues: write

    steps:
      - name: Create project (GraphQL)
        id: create_project
        uses: actions/github-script@v7
        with:
          script: |
            const query = `
              mutation {
                createProjectV2(input: {
                  ownerId: "${context.repo.owner}",
                  title: "Smart Home Air MVP"
                }) {
                  projectV2 {
                    id
                  }
                }
              }
            `;
            const result = await github.graphql(query);
            core.setOutput("project_id", result.createProjectV2.projectV2.id);

      - name: Add fields (columns)
        uses: actions/github-script@v7
        with:
          script: |
            const projectId = "${{ steps.create_project.outputs.project_id }}";
            const columnNames = [
              "Sprint 0 - 설계",
              "Sprint 1 - Graph & API",
              "Sprint 2 - Kafka + Edge",
              "Sprint 3 - Worker & Control",
              "Final Sprint - Demo",
              "Done"
            ];

            for (const name of columnNames) {
              const query = `
                mutation {
                  createProjectV2Field(input: {
                    projectId: "${projectId}",
                    dataType: SINGLE_SELECT,
                    name: "${name}"
                  }) {
                    projectV2Field {
                      id
                    }
                  }
                }
              `;
              await github.graphql(query);
              console.log("Created column:", name);
            }

      - name: Create issues (Sprint tasks)
        uses: actions/github-script@v7
        with:
          script: |
            const issues = [
              { title: "Supabase Schema 정의", body: "Sprint 0" },
              { title: "Kafka Topic 정의", body: "Sprint 0" },
              { title: "API 명세서 정리", body: "Sprint 0" },

              { title: "Graph Editor 스캐폴드", body: "Sprint 1" },
              { title: "House Graph GET/POST", body: "Sprint 1" },
              { title: "Dummy Generators 3종", body: "Sprint 1" },

                console.log(`Created issue: ${issue.title}`);
              }
            }
